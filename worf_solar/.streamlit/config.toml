[theme]
base = "light"
# primaryColor คุมสี slider/focus ทั้งแอป — ตั้งเป็นดำเพื่อให้มองแถบสไลด์เห็นชัดบนพื้นม่วงอ่อน
primaryColor = "#111111"
# ธีมสีม่วงอ่อนตาม PEA (จาก palette #D4BFFB/#8C6EF1) — พื้นหลังม่วงอ่อนมาก อ่านสบายตา
backgroundColor = "#F3EEFC"
secondaryBackgroundColor = "#E9DEFB"
textColor = "#111111"
font = "sans serif"
